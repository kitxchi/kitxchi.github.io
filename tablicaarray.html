        <style>
            button {
  padding: 6px 10px;

  border-radius: 5px;

  /* background: #eb00005b; */
            border: 2px solid #ffffff;

            display: flex;
            color: white;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); /* Lekko wzmocniony cień dla efektu */
    transition: transform 0.2s; /* Dodatkowy bajer: płynne pojawianie się */
        }

    <body>
        <div class="content">
            <h1>
                <a href="index.html" class="home">Szkola</a>
            </h1>
            <hr>
            <p style="font-size:10px; color:rgb(219, 219, 219)">Copyright (c) kitxchi 2026</p>
            <p id="czas"></p>
        <br>              
        <h2>Tablice array</h2>
        <div class="controls">
            <button onclick="addToFront()">Dodaj z przodu (unshift)</button>
            <button onclick="addToMiddle()">Dodaj w środku (splice)</button>
            <button onclick="addToEnd()">Dodaj z tyłu (push)</button>
            <button onclick="reverseArray()">Odwróć (reverse)</button>
        </div>
    
        <div id="container"></div>
        <br><br>    
        <textarea class="area-text" rows="7">  
// Nasza główna tablica (array) przechowująca dane bloczków
let blockArray = ["0", "1", "2"];
let counter = 4; // Licznik do nazywania nowych bloków

// Funkcja renderująca tablicę na ekranie
function render() {
    const container = document.getElementById('container');
    container.innerHTML = ''; // Czyścimy kontener przed ponownym rysowaniem

    blockArray.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'block';
        
        // Tworzymy napis i przycisk w jednej linii
        div.innerHTML = `
            <span>${item}</span>
            <button class="delete-btn" onclick="removeBlock(${index})">usun</button>
        `;
        
        container.appendChild(div);
    });
}

// Dodawanie na początek tablicy
function addToFront() {
    blockArray.unshift(`${counter++}`);
    render();
}

// Dodawanie na koniec tablicy
function addToEnd() {
    blockArray.push(`${counter++}`);
    render();
}

// Dodawanie w środku tablicy
function addToMiddle() {
    const middleIndex = Math.floor(blockArray.length / 2);
    blockArray.splice(middleIndex, 0, `${counter++}`);
    render();
}

// Odwracanie kolejności w tablicy
function reverseArray() {
    blockArray.reverse();
    render();
}

// Usuwanie konkretnego elementu z tablicy
function removeBlock(index) {
    blockArray.splice(index, 1);
    render();
}

// Pierwsze wywołanie, żeby pokazać początkowe bloki
render();
</textarea>
    </div>
    <script>
        // Główna tablica przechowuje teraz obiekty: { name: string, color: string }
let blockArray = [
    { name: "0", color: getRandomColor() },
    { name: "1", color: getRandomColor() },
    { name: "2", color: getRandomColor() },
    { name: "3", color: getRandomColor() },
    { name: "4", color: getRandomColor() }
];
let counter = 5;

// Funkcja generująca losowy, przyjemny dla oka kolor
function getRandomColor() {
    const hue = Math.floor(Math.random() * 360);
    return `hsla(${hue}, 70%, 45%, 0.6)`; // HSL pozwala na łatwe kontrolowanie nasycenia
}

function render() {
    const container = document.getElementById('container');
    container.innerHTML = '';

    blockArray.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'block';
        
        // Dynamicznie ustawiamy tło z obiektu w tablicy
        div.style.backgroundColor = item.color;
        
        div.innerHTML = `
            <span>${item.name}</span>
            <button class="delete-btn" onclick="removeBlock(${index})">usun</button>
        `;
        
        container.appendChild(div);
    });
}

// Przy dodawaniu tworzymy obiekt z nazwą i nowym kolorem
function addToFront() {
    blockArray.unshift({ name: `${counter++}`, color: getRandomColor() });
    render();
}

function addToEnd() {
    blockArray.push({ name: `${counter++}`, color: getRandomColor() });
    render();
}

function addToMiddle() {
    const middleIndex = Math.floor(blockArray.length / 2);
    blockArray.splice(middleIndex, 0, { name: `${counter++}`, color: getRandomColor() });
    render();
}

function reverseArray() {
    blockArray.reverse();
    render();
}

function removeBlock(index) {
    blockArray.splice(index, 1);
    render();
}

render();
    </script>

        <script src="js/data.js"></script>
</body>
