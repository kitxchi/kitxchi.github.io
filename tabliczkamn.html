        <h2>Tabliczka mnozenia</h2>
        <br><br>

        <script>
        let table = new Array(11);
        for(let i = 0; i < table.length; i++) {
            table[i] = new Array(11); 
        }
        
        for(let row = 0; row < table.length; row++) {
            for(let col = 0; col < table[row].length; col++) {
                table[row][col] = row * col;
            }
        }
       
        let tabelaHTML = "<table border='1' cellpadding='8' style='border-collapse: collapse; text-align: center;'>";
        
        for(let row = 0; row < table.length; row++) {
            tabelaHTML += "<tr>";
            for(let col = 0; col < table[row].length; col++) {
                
                tabelaHTML += "<td>" + table[row][col] + "</td>";
            }
            tabelaHTML += "</tr>";
        }
        
        tabelaHTML += "</table>";
        
        document.body.innerHTML += tabelaHTML;
        </script>
