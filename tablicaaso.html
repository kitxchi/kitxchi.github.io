    <body>
        <div class="content">
            <h1>
                <a href="index.html" class="home">Szkola</a>
            </h1>
            <hr>
            <p style="font-size:10px; color:rgb(219, 219, 219)">Copyright (c) kitxchi 2026</p>
            <p id="czas"></p>
        <br>              
        <h2>Tablica asocjacyjna</h2>
        <h4>Statystyki Bohatera</h4>
        <table id="tabela-rpg">
            <thead>
                <tr>
                    <th>Atrybut</th>
                    <th>Wartość</th>
                </tr>
            </thead>
            <tbody id="body-tabeli">
                </tbody>
        </table>
        <br><br>    
        <textarea class="area-text" rows="7">
const statystyki = {
    "Imię": "Aragorn",
    "Klasa": "Strażnik",
    "Poziom": 20,
    "Siła": 18,
    "Zręczność": 15,
    "Punkty Życia": 120
};

const tbody = document.getElementById('body-tabeli');

for (const [klucz, wartosc] of Object.entries(statystyki)) {
    const wiersz = document.createElement('tr');

    wiersz.innerHTML = `
        <td><strong>${klucz}</strong></td>
        <td>${wartosc}</td>
    `;

    tbody.appendChild(wiersz);
}
</textarea>
    </div><script>
        // 1. Definiujemy "tablicę asocjacyjną" (obiekt)
        const statystyki = {
            "Imię": "Aragorn",
            "Klasa": "Strażnik",
            "Poziom": 20,
            "Siła": 18,
            "Zręczność": 15,
            "Punkty Życia": 120
        };

        // 2. Pobieramy element body tabeli
        const tbody = document.getElementById('body-tabeli');

        // 3. Iterujemy po kluczach i wartościach obiektu
        for (const [klucz, wartosc] of Object.entries(statystyki)) {
            // Tworzymy nowy wiersz
            const wiersz = document.createElement('tr');

            // Tworzymy komórki
            wiersz.innerHTML = `
                <td><strong>${klucz}</strong></td>
                <td>${wartosc}</td>
            `;

            // Dodajemy wiersz do tabeli
            tbody.appendChild(wiersz);
        }
    </script>
        <script src="js/scripts.js"></script>
        <script src="js/data.js"></script>
</body>

</html>
