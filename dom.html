        <h2>Document Object Model</h2>
        <h4>1. Dodawanie i usuwanie</h4>
        <button id="addFirst" class="nav-button">Dodaj element na początek</button>
        <button id="add" class="nav-button">Dodaj element na koniec</button>
        <ul id="lista"></ul>
        <textarea class="area-text" rows="10">
let licznik = 1;
const lista = document.getElementById("lista");
const addBtn = document.getElementById("add");
const addFirstBtn = document.getElementById("addFirst");

function stworzElement() {
    const li = document.createElement("li");
    li.textContent = "Element " + licznik++;

    // usuwanie po kliknięciu
    li.addEventListener("click", function () {
        li.remove();
    });

    return li;
}

// dodawanie na koniec
addBtn.addEventListener("click", function () {
    lista.appendChild(stworzElement());
});

// dodawanie na początek
addFirstBtn.addEventListener("click", function () {
    lista.prepend(stworzElement());
});
</textarea><br><br>
        <h4>2. Prosty slider</h4>
        <img id="slide" src="https://picsum.photos/id/101/300/200" class="img-border"><br><br>
        <button onclick="prev()" class="nav-button">Poprzedni</button>
        <button onclick="next()" class="nav-button">Następny</button><br><br>
        <textarea class="area-text" rows="10">
const images = Array.from({ length: 10 }, () => {
    const randomId = Math.floor(Math.random() * 1000);
    return `https://picsum.photos/id/${randomId}/300/200`;
});

let index = 0;
const slide = document.getElementById("slide");

slide.src = images[index];

function next() {
    index++;
    if (index >= images.length) index = 0;
    slide.src = images[index];
}

function prev() {
    index--;
    if (index < 0) index = images.length - 1;
    slide.src = images[index];
}

setInterval(next, 3000);
</textarea><br><br>

            <script>
                /* =====================
   DODAWANIE / USUWANIE
===================== */
let licznik = 1;
const lista = document.getElementById("lista");
const addBtn = document.getElementById("add");
const addFirstBtn = document.getElementById("addFirst");

function stworzElement() {
    const li = document.createElement("li");
    li.textContent = "Element " + licznik++;

    // usuwanie po kliknięciu
    li.addEventListener("click", function () {
        li.remove();
    });

    return li;
}

// dodawanie na koniec
addBtn.addEventListener("click", function () {
    lista.appendChild(stworzElement());
});

// dodawanie na początek
addFirstBtn.addEventListener("click", function () {
    lista.prepend(stworzElement());
});

                
                /* =====================
        SLIDER
===================== */

// generujemy 10 losowych obrazków
const images = Array.from({ length: 10 }, () => {
    const randomId = Math.floor(Math.random() * 1000);
    return `https://picsum.photos/id/${randomId}/300/200`;
});

let index = 0;
const slide = document.getElementById("slide");

// ustaw pierwszy obrazek
slide.src = images[index];

function next() {
    index++;
    if (index >= images.length) index = 0;
    slide.src = images[index];
}

function prev() {
    index--;
    if (index < 0) index = images.length - 1;
    slide.src = images[index];
}

// automatyczne przesuwanie co 3 sekundy
setInterval(next, 3000);

                </script>
